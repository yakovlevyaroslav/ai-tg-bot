# Nginx + SSL для ai-tg-bot
#
# Подставьте свой домен вместо example.com
# Бот слушает 127.0.0.1:3080 (ADMIN_WEB_HOST=127.0.0.1 в .env)

server {
    listen 80;
    server_name example.com www.example.com;

    # Рассылка: фото/видео до 100 МБ (совпадает с BROADCAST_MEDIA_MAX_BYTES)
    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }
}

# После certbot появится блок listen 443 ssl — certbot --nginx -d example.com
# В ssl-блоке тоже нужна строка: client_max_body_size 100m;
